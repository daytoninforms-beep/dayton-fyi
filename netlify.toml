# Netlify configuration for Dayton Informs

[build]
  # No build command needed — static HTML files served directly
  publish = "."

# Redirect /obituaries/view?id=xxx to the view page (clean URLs)
[[redirects]]
  from = "/obituaries/view"
  to = "/obituaries/view.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
